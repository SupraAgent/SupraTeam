name: Sync builder changes upstream

on:
  push:
    branches: [main]
    paths:
      - "lib/workflow-registry.ts"
      - "lib/workflow-persistence.ts"
      - "lib/workflow-db-types.ts"
      - "lib/workflow-engine.ts"
      - "lib/workflow-actions.ts"
      - "components/workflows/**"

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SupraTeam
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout Supra-Automation-Builder
        uses: actions/checkout@v4
        with:
          repository: SupraAgent/Supra-Automation-Builder
          token: ${{ secrets.BUILDER_REPO_PAT }}
          path: builder

      - name: Get commit info
        id: info
        run: |
          echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "branch=sync/suprateam-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Create sync PR
        working-directory: builder
        env:
          GH_TOKEN: ${{ secrets.BUILDER_REPO_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ steps.info.outputs.branch }}"
          git checkout -b "$BRANCH"

          # Copy changed files into a sync directory for review
          mkdir -p sync/suprateam
          cd ../source

          # Copy builder-related files that changed
          for f in lib/workflow-registry.ts lib/workflow-persistence.ts lib/workflow-db-types.ts lib/workflow-engine.ts lib/workflow-actions.ts; do
            if [ -f "$f" ]; then
              cp "$f" ../builder/sync/suprateam/
            fi
          done

          if [ -d "components/workflows" ]; then
            cp -r components/workflows/ ../builder/sync/suprateam/components-workflows/
          fi

          cd ../builder

          # Check if there are actual changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to sync"
            exit 0
          fi

          git add sync/
          git commit -m "sync: builder changes from SupraTeam (${{ steps.info.outputs.short_sha }})

          Upstream commit: ${{ github.event.head_commit.message }}
          Source: SupraAgent/SupraTeam@${GITHUB_SHA}

          Files in sync/suprateam/ are for review — extract relevant
          generic improvements into src/ before merging.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push origin "$BRANCH"

          gh pr create \
            --title "sync: SupraTeam builder changes (${{ steps.info.outputs.short_sha }})" \
            --body "$(cat <<'BODY'
          ## Builder Changes from SupraTeam

          Workflow-related files were updated in [SupraTeam](https://github.com/SupraAgent/SupraTeam).

          **Commit:** \`${{ steps.info.outputs.short_sha }}\`
          **Message:** ${{ github.event.head_commit.message }}

          ### What to do
          Changed files are in \`sync/suprateam/\` for review. Extract any generic
          improvements into \`src/\` and delete the sync directory before merging.

          **Don't merge the sync/ folder directly** — it contains CRM-specific code.
          Pick out the generic parts that should go into the shared package.

          ---
          *Auto-generated by [sync-to-builder](https://github.com/SupraAgent/SupraTeam/actions) workflow*
          BODY
          )" \
            --base main \
            --head "$BRANCH"
